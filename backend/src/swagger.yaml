openapi: 3.0.0
info:
  title: TRC Admin API
  version: 1.0.0
  description: Enterprise-grade administrative API for Tigray Resources Center.
servers:
  - url: http://localhost:4000
    description: Development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
paths:
  /auth/login:
    post:
      summary: User login
      tags: [Auth]
      responses:
        200:
          description: Successful login
        401:
          description: Unauthorized
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        200:
          description: System is healthy
