services:
  # Redis Instance
  - type: redis
    name: trc-redis
    ipAllowList: [] # Only allow internal connections
    plan: free # Change to paid if persistence is required

  # Backend Web Service
  - type: web
    name: trc-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: oregon # Choose your preferred region
    healthCheckPath: /health # Ensure your app has this route or change it
    releaseCommand: npx prisma db push --accept-data-loss && npx prisma db seed
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: trc-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Generates a random secret if not provided
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RATE_LIMIT_WINDOW
        value: "15"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: LOG_LEVEL
        value: info

databases:
  - name: trc-db
    plan: free
    region: oregon
